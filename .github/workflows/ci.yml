name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-ci:
    name: Backend (lint + prisma + smoke test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: development
      DATABASE_URL: "postgresql://user:password@localhost:5432/medidesk_ci"
      DIRECT_URL: "postgresql://user:password@localhost:5432/medidesk_ci"
      JWT_SECRET: "ci-only-placeholder-secret"
      CLIENT_ORIGIN: "http://localhost:5173"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Smoke test — app boots without throwing
        run: node -e "require('./src/app'); console.log('app.js loaded OK')"

  frontend-ci:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    name: Deploy (Render + Vercel)
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: |
          curl -sf -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" \
            && echo "Render deploy triggered" \
            || (echo "Render deploy hook failed" && exit 1)

      - name: Trigger Vercel deploy
        run: |
          curl -sf -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}" \
            && echo "Vercel deploy triggered" \
            || (echo "Vercel deploy hook failed" && exit 1)