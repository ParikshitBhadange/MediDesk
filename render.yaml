services:
  - type: web
    name: medidesk-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: node server.js
    plan: starter
    region: oregon
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_ORIGIN
        sync: false        # e.g. https://medidesk.vercel.app
      - key: AI_API_KEY
        sync: false
      - key: AI_BASE_URL
        value: https://api.openai.com/v1
      - key: AI_MODEL
        value: gpt-4o-mini